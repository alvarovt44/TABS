<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Deudas">
<title>Mis Deudas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: #0f0f11; color: #f0ece4; font-family: Georgia, serif; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
  .wrap { max-width: 600px; margin: 0 auto; padding: 48px 16px 80px; }
  .page-label { font-size: 11px; letter-spacing: .2em; color: #a09888; text-transform: uppercase; margin-bottom: 4px; }
  h1 { font-size: 26px; font-weight: normal; margin-bottom: 20px; }

.summary { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
.sum-card { border-radius: 10px; padding: 14px 16px; }
.sum-card.they { background: #1a1a10; border: 1px solid #3a3010; }
.sum-card.me   { background: #101a1a; border: 1px solid #103030; }
.sum-title { font-size: 11px; letter-spacing: .15em; text-transform: uppercase; margin-bottom: 8px; }
.sum-card.they .sum-title { color: #a09050; }
.sum-card.me   .sum-title { color: #508090; }
.sum-line { font-size: 13px; margin-bottom: 2px; }
.sum-card.they .sum-line { color: #e8c97a; }
.sum-card.me   .sum-line { color: #7ac8e8; }
.sum-zero { color: #504840; font-size: 13px; }

.card { background: #18181c; border: 1px solid #2d2d35; border-radius: 12px; padding: 18px; margin-bottom: 24px; }
.card-label { font-size: 11px; letter-spacing: .15em; color: #a09888; text-transform: uppercase; margin-bottom: 14px; }
.field { margin-bottom: 10px; }
input[type=text], input[type=number] {
background: #111; border: 1px solid #2d2d35; border-radius: 8px; color: #f0ece4;
padding: 10px 14px; font-size: 16px; width: 100%; font-family: Georgia, serif; transition: border-color .2s; }
input:focus { outline: none; border-color: #e8c97a; }
input::placeholder { color: #504840; }
.row2 { display: flex; gap: 10px; }
.row2 input { margin-bottom: 0; }

.dir-toggle { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #2d2d35; margin-bottom: 10px; }
.dir-btn { flex: 1; padding: 10px; background: #111; border: none; color: #a09888;
font-family: Georgia, serif; font-size: 13px; cursor: pointer; transition: all .2s; text-align: center; }
.dir-btn.active-they { background: #2a2210; color: #e8c97a; }
.dir-btn.active-me   { background: #0e2228; color: #7ac8e8; }

.cur-toggle { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid #2d2d35; flex-shrink: 0; }
.cur-btn { padding: 10px 14px; background: #111; border: none; color: #a09888;
font-family: Georgia, serif; font-size: 13px; cursor: pointer; transition: all .2s; white-space: nowrap; }
.cur-btn.active-usd { background: #3a2e10; color: #e8c97a; }
.cur-btn.active-mxn { background: #103040; color: #7ac8e8; }

.btn-add { background: #e8c97a; color: #111; border: none; border-radius: 8px; padding: 13px;
width: 100%; font-size: 15px; font-family: Georgia, serif; cursor: pointer; letter-spacing: .05em; margin-top: 4px; }

.filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
.ftab { padding: 7px 14px; border-radius: 20px; border: 1px solid #2d2d35; background: transparent;
color: #a09888; font-size: 13px; cursor: pointer; font-family: Georgia, serif; transition: all .2s; }
.ftab.active { border-color: #e8c97a; background: rgba(232,201,122,.1); color: #e8c97a; }

.person-group { margin-bottom: 18px; }
.person-header { display: flex; justify-content: space-between; align-items: center;
padding: 12px 14px; background: #141418; border-radius: 8px 8px 0 0;
border: 1px solid #2d2d35; border-bottom: none; cursor: pointer; user-select: none; }
.person-header.rounded { border-radius: 8px; border-bottom: 1px solid #2d2d35; }
.person-name { font-size: 15px; font-weight: bold; }
.person-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
.person-total { font-size: 13px; }
.person-total.they { color: #e8c97a; }
.person-total.me   { color: #7ac8e8; }
.person-total.zero { color: #5a8a5a; }
.toggle-icon { color: #a09888; font-size: 11px; margin-left: 4px; }
.person-body { border: 1px solid #2d2d35; border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; }

.pay-band { background: #111; border-top: 1px solid #2d2d35; padding: 12px 14px; display: none; }
.pay-band.open { display: block; }
.pay-band-label { font-size: 11px; color: #a09888; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 8px; }
.pay-band-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.pay-band-row input { flex: 1; min-width: 120px; font-size: 16px; }
.pay-band-cur { display: flex; border-radius: 6px; overflow: hidden; border: 1px solid #2d2d35; flex-shrink: 0; }
.pay-band-cur button { padding: 10px 12px; background: #111; border: none; color: #a09888;
font-family: Georgia, serif; font-size: 13px; cursor: pointer; transition: all .2s; }
.pay-band-cur button.active-usd { background: #3a2e10; color: #e8c97a; }
.pay-band-cur button.active-mxn { background: #103040; color: #7ac8e8; }
.btn-pay-ok { background: #2d6a4a; color: #b6f5d0; border: none; border-radius: 6px;
padding: 10px 14px; cursor: pointer; font-family: Georgia, serif; font-size: 13px; white-space: nowrap; }
.btn-pay-cancel { background: #2a2a32; color: #a09888; border: none; border-radius: 6px;
padding: 10px 10px; cursor: pointer; font-family: Georgia, serif; font-size: 13px; }

.debt-row { padding: 12px 14px; border-bottom: 1px solid #1e1e24; display: flex; justify-content: space-between; align-items: flex-start; }
.debt-row:last-child { border-bottom: none; }
.debt-row.paid { opacity: .5; background: #0e0e10; }
.debt-left { flex: 1; min-width: 0; }
.debt-dir { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 3px; }
.debt-dir.they { color: #a09050; }
.debt-dir.me   { color: #508090; }
.debt-amount-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; flex-wrap: wrap; }
.debt-original { font-size: 17px; }
.debt-original.they { color: #e8c97a; }
.debt-original.me   { color: #7ac8e8; }
.debt-row.paid .debt-original { color: #5a8a5a !important; }
.debt-pending { font-size: 12px; color: #c07a40; }
.debt-paid-label { font-size: 12px; color: #5a8a5a; }
.debt-note { font-size: 12px; color: #a09888; margin-top: 2px; }
.debt-date { font-size: 11px; color: #504840; margin-top: 4px; }
.abono-history { font-size: 11px; color: #605850; margin-top: 3px; line-height: 1.5; }
.debt-actions { display: flex; gap: 5px; margin-left: 10px; flex-shrink: 0; flex-direction: column; align-items: flex-end; }
.badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 8px; }
.badge-usd { background: #3a2e10; color: #e8c97a; }
.badge-mxn { background: #103040; color: #7ac8e8; }
.btn-sm { border-radius: 6px; padding: 6px 10px; cursor: pointer; font-size: 12px; border: 1px solid; white-space: nowrap; font-family: Georgia, serif; }
.btn-del { background: #2a1a1a; border-color: #4a2a2a; color: #c06060; }
.btn-pagar-persona { background: #1a2e1a; border: 1px solid #2a5a2a; color: #6abf8a;
border-radius: 6px; padding: 7px 12px; cursor: pointer; font-size: 12px;
font-family: Georgia, serif; white-space: nowrap; }

/* Backup section */
.backup-card { background: #13131a; border: 1px solid #22222e; border-radius: 12px; padding: 16px 18px; margin-bottom: 24px; }
.backup-title { font-size: 11px; letter-spacing: .15em; color: #706860; text-transform: uppercase; margin-bottom: 12px; }
.backup-row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn-backup { flex: 1; min-width: 120px; padding: 11px 10px; border-radius: 8px; border: 1px solid;
font-family: Georgia, serif; font-size: 13px; cursor: pointer; text-align: center; transition: all .2s; }
.btn-export { background: #1a1a28; border-color: #3a3a5a; color: #9a9ac8; }
.btn-export:active { background: #2a2a3a; }
.btn-import { background: #1a2820; border-color: #2a5040; color: #6ab89a; }
.btn-import:active { background: #1e3028; }
.backup-note { font-size: 11px; color: #504840; margin-top: 10px; line-height: 1.5; }
#import-file { display: none; }

.empty { color: #a09888; text-align: center; padding: 40px 20px; font-size: 14px; }

#toast { position: fixed; top: env(safe-area-inset-top, 18px); right: 18px; left: 18px; max-width: 400px;
margin: 0 auto; background: #1a2a1a; border: 1px solid #2d5a2d;
color: #f0ece4; padding: 12px 18px; border-radius: 10px; font-size: 13px; line-height: 1.5;
box-shadow: 0 4px 20px rgba(0,0,0,.6); display: none; z-index: 99; font-family: Georgia, serif; text-align: center; }

#modal { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 98; display: none; align-items: center; justify-content: center; padding: 20px; }
#modal.show { display: flex; }
.modal-box { background: #18181c; border: 1px solid #2d2d35; border-radius: 14px; padding: 28px 22px; max-width: 320px; width: 100%; text-align: center; }
.modal-icon { font-size: 32px; margin-bottom: 10px; }
.modal-title { font-size: 16px; margin-bottom: 5px; }
.modal-sub { color: #a09888; font-size: 13px; margin-bottom: 20px; line-height: 1.5; }
.modal-btns { display: flex; gap: 8px; justify-content: center; }
.btn-mcancel  { background: #2a2a32; color: #f0ece4; border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer; font-family: Georgia, serif; font-size: 14px; }
.btn-mconfirm { background: #2d6a4a; color: #b6f5d0; border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer; font-family: Georgia, serif; font-size: 14px; }
</style>

</head>
<body>
<div class="wrap">
  <div class="page-label">Registro Personal</div>
  <h1>Mis Deudas</h1>

  <div class="summary">
    <div class="sum-card they"><div class="sum-title">Me deben a mí</div><div id="sum-they"></div></div>
    <div class="sum-card me"><div class="sum-title">Yo les debo</div><div id="sum-me"></div></div>
  </div>

  <div class="card">
    <div class="card-label">Nueva deuda</div>
    <div class="dir-toggle">
      <button class="dir-btn active-they" id="dir-they" onclick="setDir('they')">👤 Me deben a mí</button>
      <button class="dir-btn" id="dir-me" onclick="setDir('me')">🤝 Yo le debo</button>
    </div>
    <div class="field"><input type="text" id="inp-person" placeholder="Nombre de la persona" autocomplete="off" /></div>
    <div class="row2 field">
      <input type="number" id="inp-amount" placeholder="Cantidad" inputmode="decimal" />
      <div class="cur-toggle">
        <button class="cur-btn active-usd" id="btn-usd" onclick="setCur('USD')">USD</button>
        <button class="cur-btn" id="btn-mxn" onclick="setCur('MXN')">MXN</button>
      </div>
    </div>
    <div class="field"><input type="text" id="inp-note" placeholder="Nota opcional" autocomplete="off" /></div>
    <button class="btn-add" onclick="addDebt()">+ Agregar</button>
  </div>

  <div class="filters">
    <button class="ftab active" onclick="setFilter('pendiente',this)">Pendientes</button>
    <button class="ftab" onclick="setFilter('pagado',this)">Saldadas</button>
    <button class="ftab" onclick="setFilter('todos',this)">Todas</button>
  </div>

  <div id="list"></div>

  <!-- Backup -->

  <div class="backup-card">
    <div class="backup-title">📦 Respaldo de datos</div>
    <div class="backup-row">
      <button class="btn-backup btn-export" onclick="exportData()">⬇ Exportar respaldo</button>
      <button class="btn-backup btn-import" onclick="document.getElementById('import-file').click()">⬆ Importar respaldo</button>
    </div>
    <div class="backup-note">Exporta un archivo .json con todos tus datos. Guárdalo en iCloud o Archivos para restaurarlo si borras el navegador.</div>
    <input type="file" id="import-file" accept=".json" onchange="importData(event)" />
  </div>
</div>

<div id="toast"></div>
<div id="modal">
  <div class="modal-box">
    <div class="modal-icon">💸</div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-btns">
      <button class="btn-mcancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-mconfirm" onclick="confirmModal()">Confirmar</button>
    </div>
  </div>
</div>

<script>
const KEY = "mis-deudas-v4";
let debts = [];
let filter = "pendiente";
let selDir = "they", selCur = "USD";
let modalAction = null;
let collapsed = {}, openPayBand = {}, payBandCur = {};

function save() { localStorage.setItem(KEY, JSON.stringify(debts)); }
function load() {
  try { const r = localStorage.getItem(KEY); if (r) debts = JSON.parse(r); } catch(e) {}
  render();
}

function setDir(d) {
  selDir = d;
  document.getElementById("dir-they").className = "dir-btn" + (d==="they" ? " active-they" : "");
  document.getElementById("dir-me").className   = "dir-btn" + (d==="me"   ? " active-me" : "");
}
function setCur(c) {
  selCur = c;
  document.getElementById("btn-usd").className = "cur-btn" + (c==="USD" ? " active-usd" : "");
  document.getElementById("btn-mxn").className = "cur-btn" + (c==="MXN" ? " active-mxn" : "");
}
function setFilter(f, el) {
  filter = f;
  document.querySelectorAll(".ftab").forEach(b => b.classList.remove("active"));
  el.classList.add("active");
  render();
}

function fmt(amount, cur) { return new Intl.NumberFormat("es-MX",{style:"currency",currency:cur}).format(amount); }
function fmtDate(iso) { return new Date(iso).toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"}); }
function pending(d) { return Math.max(0, d.amount - (d.abonos||[]).reduce((s,a)=>s+a.amount,0)); }

function addDebt() {
  const person = document.getElementById("inp-person").value.trim();
  const amount = parseFloat(document.getElementById("inp-amount").value);
  const note   = document.getElementById("inp-note").value.trim();
  if (!person || isNaN(amount) || amount <= 0) return;
  debts.unshift({id:Date.now(),person,amount,currency:selCur,direction:selDir,note,date:new Date().toISOString(),status:"pendiente",abonos:[]});
  save();
  document.getElementById("inp-person").value = "";
  document.getElementById("inp-amount").value = "";
  document.getElementById("inp-note").value = "";
  render();
  toast("Deuda de " + person + " registrada ✓");
}

function applyPayment(person, payAmount, payCur) {
  let remaining = payAmount;
  const dateNow = new Date().toISOString();
  const targets = debts
    .filter(d => d.person===person && d.status==="pendiente" && (d.currency||"USD")===payCur)
    .sort((a,b) => new Date(a.date)-new Date(b.date));
  if (targets.length === 0) { toast("No hay deudas pendientes en "+payCur+" para "+person, "warn"); return false; }
  let count = 0;
  for (const d of targets) {
    if (remaining <= 0) break;
    const toApply = Math.min(remaining, pending(d));
    d.abonos = d.abonos || [];
    d.abonos.push({amount:toApply, date:dateNow});
    remaining -= toApply;
    if (pending(d) <= 0) d.status = "pagado";
    count++;
  }
  save();
  let msg = "Pago de " + fmt(payAmount, payCur) + " aplicado";
  if (count > 1) msg += " a " + count + " deudas";
  if (remaining > 0) msg += "\nSobran " + fmt(remaining, payCur) + " (sin más deudas pendientes en "+payCur+")";
  toast(msg);
  return true;
}

function togglePayBand(person) {
  openPayBand[person] = !openPayBand[person];
  if (!payBandCur[person]) payBandCur[person] = "USD";
  render();
  if (openPayBand[person]) setTimeout(() => { const el = document.getElementById("pay-inp-"+CSS.escape(person)); if(el) el.focus(); }, 60);
}
function setPayBandCur(person, cur) { payBandCur[person] = cur; render(); }
function submitPayment(person) {
  const el = document.getElementById("pay-inp-"+CSS.escape(person)); if (!el) return;
  const amount = parseFloat(el.value);
  if (isNaN(amount) || amount <= 0) return;
  const ok = applyPayment(person, amount, payBandCur[person]||"USD");
  if (ok) { openPayBand[person] = false; render(); }
}

function deleteDebt(id) {
  const d = debts.find(x=>x.id===id); if (!d) return;
  openModal("¿Eliminar registro?","<strong>"+d.person+"</strong> — "+fmt(d.amount,d.currency||"USD"),
    () => { debts = debts.filter(x=>x.id!==id); save(); render(); toast("Registro eliminado"); });
}
function togglePerson(person) { collapsed[person] = !collapsed[person]; render(); }
function openModal(title, sub, action) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-sub").innerHTML = sub;
  modalAction = action;
  document.getElementById("modal").classList.add("show");
}
function closeModal() { modalAction = null; document.getElementById("modal").classList.remove("show"); }
function confirmModal() { if (modalAction) modalAction(); closeModal(); }

// ── Export ──
function exportData() {
  if (debts.length === 0) { toast("No hay datos para exportar", "warn"); return; }
  const data = { version: 1, exportDate: new Date().toISOString(), debts };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:"application/json"});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = "mis-deudas-" + date + ".json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast("Respaldo exportado ✓\nGuárdalo en iCloud / Archivos");
}

// ── Import ──
function importData(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      const imported = data.debts || (Array.isArray(data) ? data : null);
      if (!imported) { toast("Archivo inválido", "warn"); return; }
      openModal(
        "¿Importar respaldo?",
        "Se cargarán <strong>" + imported.length + " registros</strong>.<br>Los datos actuales serán reemplazados.",
        () => {
          debts = imported;
          save(); render();
          toast("Datos importados: " + imported.length + " registros ✓");
        }
      );
    } catch(err) { toast("Error al leer el archivo", "warn"); }
  };
  reader.readAsText(file);
  event.target.value = "";
}

function toast(msg, type) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.background   = type==="warn" ? "#2a1a0a" : "#1a2a1a";
  t.style.borderColor  = type==="warn" ? "#6a3a0a" : "#2d5a2d";
  t.style.display = "block";
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.style.display="none", 3500);
}

function render() {
  const sumTheyUSD = debts.filter(d=>d.direction==="they"&&d.status==="pendiente"&&(d.currency||"USD")==="USD").reduce((s,d)=>s+pending(d),0);
  const sumTheyMXN = debts.filter(d=>d.direction==="they"&&d.status==="pendiente"&&d.currency==="MXN").reduce((s,d)=>s+pending(d),0);
  const sumMeUSD   = debts.filter(d=>d.direction==="me"  &&d.status==="pendiente"&&(d.currency||"USD")==="USD").reduce((s,d)=>s+pending(d),0);
  const sumMeMXN   = debts.filter(d=>d.direction==="me"  &&d.status==="pendiente"&&d.currency==="MXN").reduce((s,d)=>s+pending(d),0);
  const rs = (usd,mxn,el) => {
    let h = "";
    if (usd>0) h+=`<div class="sum-line">${fmt(usd,"USD")}</div>`;
    if (mxn>0) h+=`<div class="sum-line">${fmt(mxn,"MXN")}</div>`;
    if (!usd&&!mxn) h=`<div class="sum-zero">Sin pendientes</div>`;
    document.getElementById(el).innerHTML=h;
  };
  rs(sumTheyUSD,sumTheyMXN,"sum-they");
  rs(sumMeUSD,sumMeMXN,"sum-me");

  const visible = debts.filter(d=>filter==="todos"||d.status===filter);
  const persons=[]; const personMap={};
  visible.forEach(d=>{ if(!personMap[d.person]){personMap[d.person]=[];persons.push(d.person);} personMap[d.person].push(d); });

  const list = document.getElementById("list");
  if (persons.length===0) {
    list.innerHTML='<div class="empty">'+(filter==="pendiente"?"No hay deudas pendientes 🎉":"Sin registros")+'</div>';
    return;
  }

  list.innerHTML = persons.map(person => {
    const items = personMap[person];
    const isCollapsed = collapsed[person];
    const isPayOpen   = openPayBand[person];
    const pCur        = payBandCur[person]||"USD";
    const ep          = person.replace(/\\/g,"\\\\").replace(/'/g,"\\'");

    const totals={};
    items.forEach(d=>{ if(d.status!=="pendiente") return; const k=d.direction+"_"+(d.currency||"USD"); totals[k]=(totals[k]||0)+pending(d); });
    const hasPending = Object.keys(totals).length>0;

    let th="";
    if(totals["they_USD"]) th+=`<span class="person-total they">${fmt(totals["they_USD"],"USD")}</span>`;
    if(totals["they_MXN"]) th+=`<span class="person-total they">${fmt(totals["they_MXN"],"MXN")}</span>`;
    if(totals["me_USD"])   th+=`<span class="person-total me">${fmt(totals["me_USD"],"USD")}</span>`;
    if(totals["me_MXN"])   th+=`<span class="person-total me">${fmt(totals["me_MXN"],"MXN")}</span>`;
    if(!th)                th =`<span class="person-total zero">✓ Todo saldado</span>`;

    const payBandHtml=`
      <div class="pay-band ${isPayOpen?'open':''}">
        <div class="pay-band-label">Registrar pago — se aplica a todas las deudas pendientes</div>
        <div class="pay-band-row">
          <input type="number" inputmode="decimal" id="pay-inp-${person}" placeholder="Monto recibido"
                 onkeydown="if(event.key==='Enter') submitPayment('${ep}')" />
          <div class="pay-band-cur">
            <button id="pbc-usd-${person}" onclick="setPayBandCur('${ep}','USD')" class="${pCur==='USD'?'active-usd':''}">USD</button>
            <button id="pbc-mxn-${person}" onclick="setPayBandCur('${ep}','MXN')" class="${pCur==='MXN'?'active-mxn':''}">MXN</button>
          </div>
          <button class="btn-pay-ok" onclick="submitPayment('${ep}')">✓ Aplicar</button>
          <button class="btn-pay-cancel" onclick="togglePayBand('${ep}')">✕</button>
        </div>
      </div>`;

    const rowsHtml = items.map(d=>{
      const cur=(d.currency||"USD");
      const pend=pending(d);
      const abonosTotal=(d.abonos||[]).reduce((s,a)=>s+a.amount,0);
      const dirLabel=d.direction==="they"?"me debe":"le debo";
      const dirClass=d.direction==="they"?"they":"me";
      const amtClass=d.direction==="they"?"they":"me";
      const badgeClass=cur==="MXN"?"badge-mxn":"badge-usd";

      let ai=`<span class="debt-original ${amtClass}">${fmt(d.amount,cur)}</span>`;
      if(abonosTotal>0 && d.status!=="pagado") ai+=` <span class="debt-pending">resta ${fmt(pend,cur)}</span>`;
      if(d.status==="pagado") ai+=` <span class="debt-paid-label">✓ saldado</span>`;

      let abHist="";
      if((d.abonos||[]).length>0){
        abHist=`<div class="abono-history">Pagos: `+d.abonos.map(a=>`${fmt(a.amount,cur)} el ${fmtDate(a.date)}`).join(" · ")+`</div>`;
      }
      return `
        <div class="debt-row ${d.status==='pagado'?'paid':''}">
          <div class="debt-left">
            <div class="debt-dir ${dirClass}">${dirLabel} <span class="badge ${badgeClass}">${cur}</span></div>
            <div class="debt-amount-row">${ai}</div>
            ${d.note?`<div class="debt-note">${d.note}</div>`:''}
            ${abHist}
            <div class="debt-date">${fmtDate(d.date)}</div>
          </div>
          <div class="debt-actions">
            <button class="btn-sm btn-del" onclick="deleteDebt(${d.id})">✕</button>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="person-group">
        <div class="person-header ${isCollapsed?'rounded':''}" onclick="togglePerson('${ep}')">
          <span class="person-name">${person}</span>
          <div class="person-meta">
            ${th}
            ${hasPending&&filter!=='pagado'?`<button class="btn-pagar-persona" onclick="event.stopPropagation();togglePayBand('${ep}')">💵 Pago</button>`:''}
            <span class="toggle-icon">${isCollapsed?'▶':'▼'}</span>
          </div>
        </div>
        ${isCollapsed?'':(`<div class="person-body">${payBandHtml}${rowsHtml}</div>`)}
      </div>`;
  }).join('');
}

document.getElementById("inp-note").addEventListener("keydown", e=>{ if(e.key==="Enter") addDebt(); });
load();
</script>

</body>
</html>
